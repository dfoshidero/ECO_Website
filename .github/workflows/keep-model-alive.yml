name: Keep model endpoint alive

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Hugging Face Space
        run: |
          curl -sS --fail-with-body \
            --retry 3 --retry-delay 30 --retry-all-errors \
            --max-time 120 \
            https://dfoshidero-eco-carbonfromtext.hf.space/
